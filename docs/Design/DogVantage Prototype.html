<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DogVantage – Design Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #root { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ── TOKENS ─────────────────────────────────── */
const T = {
  bg: '#faf8f4',
  bgAlt: '#f2ede5',
  surface: '#ffffff',
  primary: '#2d6a4f',
  primaryDark: '#1b4332',
  primaryLight: '#52b788',
  accent: '#f4a261',
  accentLight: '#fde8d4',
  text: '#1c1917',
  textMuted: '#78716c',
  border: '#e7e0d8',
  green100: '#d8f0e5',
  green50: '#edf8f2',
  shadow: '0 2px 12px rgba(0,0,0,0.08)',
  shadowLg: '0 8px 32px rgba(0,0,0,0.12)',
  radius: '16px',
  radiusSm: '10px',
};

/* ── MOCK DATA ───────────────────────────────── */
const MOCK_TRAINING = `**Vecka 14 – Grundläggande lydnad & nyfikenhetsträning**

Den här veckan fokuserar vi på att bygga en trygg kontakt. Låt valpen utforska nya miljöer i lugnt tempo – gärna skog eller ängsmark. Träna "sitt" och "ligg" i korta pass om 3–5 minuter, max 2–3 gånger per dag.

Braque Français är en hund med stark drivkraft och god näskontakt. Uppmuntra naturlig markering och spårning redan nu – det stärker självförtroendet.

Undvik hård reprimand i detta stadie. Positiv förstärkning med godis och lek är det som ger bäst resultat på lång sikt.`;

const MOCK_CHAT = [
  { role: 'model', content: 'Hej! Jag är din träningsassistent för Braque Français. Vad undrar du?' },
];

/* ── SHARED COMPONENTS ───────────────────────── */
function Avatar({ photo, name, size = 72 }) {
  const initials = name ? name[0].toUpperCase() : '?';
  return (
    <div style={{
      width: size, height: size, borderRadius: '50%',
      background: photo ? 'none' : `linear-gradient(135deg, ${T.primaryLight}, ${T.primary})`,
      border: `3px solid ${T.surface}`,
      boxShadow: T.shadow,
      overflow: 'hidden', flexShrink: 0,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}>
      {photo
        ? <img src={photo} style={{ width: '100%', height: '100%', objectFit: 'cover' }} alt={name} />
        : <span style={{ color: '#fff', fontSize: size * 0.38, fontWeight: 700 }}>{initials}</span>
      }
    </div>
  );
}

function BottomNav({ screen, onNav }) {
  const items = [
    { id: 'dashboard', label: 'Hem', icon: HomeIcon },
    { id: 'chat', label: 'Chatt', icon: ChatIcon },
    { id: 'log', label: 'Logg', icon: LogIcon },
  ];
  return (
    <nav style={{
      display: 'flex', position: 'absolute', bottom: 0, left: 0, right: 0,
      background: T.surface, borderTop: `1px solid ${T.border}`,
      paddingBottom: 20, paddingTop: 8,
    }}>
      {items.map(({ id, label, icon: Icon }) => {
        const active = screen === id;
        return (
          <button key={id} onClick={() => onNav(id)} style={{
            flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center',
            gap: 3, background: 'none', border: 'none', cursor: 'pointer',
            color: active ? T.primary : T.textMuted,
            fontSize: 11, fontWeight: active ? 600 : 400,
            fontFamily: "'DM Sans', sans-serif",
            transition: 'color 0.15s',
          }}>
            <Icon size={22} color={active ? T.primary : T.textMuted} />
            {label}
          </button>
        );
      })}
    </nav>
  );
}

/* ── ICONS (simple SVG) ──────────────────────── */
function HomeIcon({ size = 22, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  );
}
function ChatIcon({ size = 22, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
  );
}
function LogIcon({ size = 22, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/>
    </svg>
  );
}
function ChevronRight({ size = 18, color = T.textMuted }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <polyline points="9 18 15 12 9 6"/>
    </svg>
  );
}
function CameraIcon({ size = 28, color = T.textMuted }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
      <circle cx="12" cy="13" r="4"/>
    </svg>
  );
}
function SendIcon({ size = 18, color = '#fff' }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
    </svg>
  );
}
function StarIcon({ filled, size = 20 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill={filled ? T.accent : 'none'} stroke={filled ? T.accent : T.border} strokeWidth="2">
      <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
    </svg>
  );
}

/* ── SCREEN: LANDING ─────────────────────────── */
function LandingScreen({ onStart }) {
  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: T.bg, overflowY: 'auto' }}>
      {/* Hero */}
      <div style={{
        background: `linear-gradient(160deg, ${T.primaryDark} 0%, ${T.primary} 60%, ${T.primaryLight} 100%)`,
        padding: '52px 28px 40px',
        position: 'relative', overflow: 'hidden',
      }}>
        {/* Decorative circles */}
        <div style={{ position: 'absolute', top: -40, right: -40, width: 180, height: 180, borderRadius: '50%', background: 'rgba(255,255,255,0.06)' }} />
        <div style={{ position: 'absolute', bottom: -20, left: -20, width: 120, height: 120, borderRadius: '50%', background: 'rgba(255,255,255,0.04)' }} />

        {/* Dog photo placeholder */}
        <div style={{
          width: 120, height: 120, borderRadius: '50%', background: 'rgba(255,255,255,0.12)',
          border: '3px solid rgba(255,255,255,0.2)',
          margin: '0 auto 20px',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 48,
        }}>🐕</div>

        <h1 style={{ color: '#fff', fontSize: 32, fontWeight: 700, textAlign: 'center', letterSpacing: '-0.5px' }}>
          DogVantage
        </h1>
        <p style={{ color: 'rgba(255,255,255,0.8)', fontSize: 15, textAlign: 'center', marginTop: 8, lineHeight: 1.5 }}>
          Träningsplan anpassad för din hund — baserad på rasklubbens egna dokument.
        </p>
      </div>

      {/* Features */}
      <div style={{ padding: '28px 24px', flex: 1 }}>
        {[
          { icon: '📅', title: 'Veckovis schema', desc: 'Träning anpassad efter valpdagar och ras' },
          { icon: '📖', title: 'Direkt från RAS', desc: 'Råd hämtade från rasklubbens officiella dokument' },
          { icon: '✍️', title: 'Följ din hunds framsteg', desc: 'Logga pass och se hur träningen utvecklas' },
        ].map((f, i) => (
          <div key={i} style={{ display: 'flex', gap: 16, marginBottom: 20, alignItems: 'flex-start' }}>
            <div style={{
              width: 44, height: 44, borderRadius: 12, background: T.green50,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: 20, flexShrink: 0,
            }}>{f.icon}</div>
            <div>
              <div style={{ fontWeight: 600, fontSize: 15, color: T.text }}>{f.title}</div>
              <div style={{ fontSize: 13, color: T.textMuted, marginTop: 2, lineHeight: 1.4 }}>{f.desc}</div>
            </div>
          </div>
        ))}
      </div>

      {/* CTA */}
      <div style={{ padding: '0 24px 40px' }}>
        <button onClick={onStart} style={{
          width: '100%', padding: '16px', borderRadius: 14,
          background: T.primary, color: '#fff',
          fontSize: 16, fontWeight: 600, border: 'none', cursor: 'pointer',
          fontFamily: "'DM Sans', sans-serif",
          boxShadow: `0 4px 16px rgba(45,106,79,0.35)`,
          transition: 'transform 0.1s',
        }}>
          Kom igång
        </button>
        <button onClick={() => {}} style={{
          width: '100%', padding: '14px', borderRadius: 14,
          background: 'none', color: T.textMuted,
          fontSize: 15, fontWeight: 500, border: 'none', cursor: 'pointer',
          marginTop: 10, fontFamily: "'DM Sans', sans-serif",
        }}>
          Jag har redan ett konto
        </button>
      </div>
    </div>
  );
}

/* ── SCREEN: ONBOARDING ──────────────────────── */
function OnboardingScreen({ onDone }) {
  const [step, setStep] = useState(0);
  const [photo, setPhoto] = useState(null);
  const [name, setName] = useState('');
  const [breed, setBreed] = useState('');
  const [birthdate, setBirthdate] = useState('');
  const fileRef = useRef();

  const breeds = [
    { value: 'braque_francais', label: 'Braque Français' },
    { value: 'labrador', label: 'Labrador Retriever' },
    { value: 'italian_greyhound', label: 'Italiensk Vinthund' },
  ];

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setPhoto(ev.target.result);
    reader.readAsDataURL(file);
  }

  const steps = [
    // Step 0: Photo
    <div key={0} style={{ padding: '0 24px', flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
      <p style={{ fontSize: 15, color: T.textMuted, textAlign: 'center', marginBottom: 32, lineHeight: 1.5 }}>
        Lägg till ett foto på din hund — det gör appen personligare.
      </p>

      <input ref={fileRef} type="file" accept="image/*" style={{ display: 'none' }} onChange={handlePhoto} />

      <div onClick={() => fileRef.current.click()} style={{
        width: 180, height: 180, borderRadius: '50%',
        background: photo ? 'none' : T.bgAlt,
        border: `3px dashed ${photo ? T.primary : T.border}`,
        cursor: 'pointer', overflow: 'hidden',
        display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
        gap: 8, transition: 'border-color 0.2s',
      }}>
        {photo
          ? <img src={photo} style={{ width: '100%', height: '100%', objectFit: 'cover' }} alt="Hund" />
          : <>
              <CameraIcon size={36} color={T.textMuted} />
              <span style={{ fontSize: 13, color: T.textMuted, fontWeight: 500 }}>Välj foto</span>
            </>
        }
      </div>

      {photo && (
        <button onClick={() => fileRef.current.click()} style={{
          marginTop: 16, background: 'none', border: 'none', color: T.primary,
          fontSize: 14, fontWeight: 600, cursor: 'pointer', fontFamily: "'DM Sans', sans-serif",
        }}>Byt foto</button>
      )}

      <p style={{ fontSize: 12, color: T.textMuted, marginTop: 16, textAlign: 'center' }}>
        Du kan hoppa över detta och lägga till senare.
      </p>
    </div>,

    // Step 1: Name + Breed
    <div key={1} style={{ padding: '0 24px', flex: 1, width: '100%' }}>
      <div style={{ marginBottom: 20 }}>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: T.text, marginBottom: 6 }}>
          Hundens namn
        </label>
        <input
          value={name}
          onChange={e => setName(e.target.value)}
          placeholder="T.ex. Bella"
          style={{
            width: '100%', padding: '14px 16px', borderRadius: 12,
            border: `1.5px solid ${T.border}`, fontSize: 16,
            fontFamily: "'DM Sans', sans-serif", color: T.text,
            background: T.surface, outline: 'none',
            transition: 'border-color 0.2s',
          }}
          onFocus={e => e.target.style.borderColor = T.primary}
          onBlur={e => e.target.style.borderColor = T.border}
        />
      </div>

      <div>
        <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: T.text, marginBottom: 10 }}>
          Ras
        </label>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {breeds.map(b => (
            <button key={b.value} onClick={() => setBreed(b.value)} style={{
              padding: '14px 16px', borderRadius: 12, textAlign: 'left',
              border: `2px solid ${breed === b.value ? T.primary : T.border}`,
              background: breed === b.value ? T.green50 : T.surface,
              color: breed === b.value ? T.primary : T.text,
              fontWeight: breed === b.value ? 600 : 400,
              fontSize: 15, cursor: 'pointer',
              fontFamily: "'DM Sans', sans-serif",
              transition: 'all 0.15s', display: 'flex', alignItems: 'center', justifyContent: 'space-between',
            }}>
              {b.label}
              {breed === b.value && <span style={{ color: T.primary }}>✓</span>}
            </button>
          ))}
        </div>
      </div>
    </div>,

    // Step 2: Birthdate
    <div key={2} style={{ padding: '0 24px', flex: 1, width: '100%' }}>
      <p style={{ fontSize: 15, color: T.textMuted, marginBottom: 24, lineHeight: 1.5 }}>
        Vi beräknar vilket träningsstadium din hund befinner sig i baserat på födelsedag.
      </p>

      <label style={{ display: 'block', fontSize: 13, fontWeight: 600, color: T.text, marginBottom: 6 }}>
        Födelsedag
      </label>
      <input
        type="date"
        value={birthdate}
        onChange={e => setBirthdate(e.target.value)}
        style={{
          width: '100%', padding: '14px 16px', borderRadius: 12,
          border: `1.5px solid ${T.border}`, fontSize: 16,
          fontFamily: "'DM Sans', sans-serif", color: T.text,
          background: T.surface, outline: 'none',
        }}
      />

      {birthdate && (
        <div style={{
          marginTop: 20, padding: '16px', borderRadius: 12,
          background: T.green50, border: `1px solid ${T.green100}`,
        }}>
          <div style={{ fontSize: 13, color: T.textMuted }}>Beräknad vecka</div>
          <div style={{ fontSize: 24, fontWeight: 700, color: T.primary, marginTop: 4 }}>
            Vecka {Math.floor((Date.now() - new Date(birthdate)) / (1000 * 60 * 60 * 24 * 7))}
          </div>
        </div>
      )}
    </div>,
  ];

  const titles = ['Lägg till ett foto', 'Om din hund', 'När är hunden född?'];
  const canNext = [
    true, // photo optional
    name.trim().length > 0 && breed.length > 0,
    birthdate.length > 0,
  ];

  function handleNext() {
    if (step < steps.length - 1) setStep(s => s + 1);
    else onDone({ photo, name, breed, birthdate });
  }

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: T.bg }}>
      {/* Progress */}
      <div style={{ padding: '16px 24px 0', display: 'flex', gap: 6 }}>
        {steps.map((_, i) => (
          <div key={i} style={{
            flex: 1, height: 4, borderRadius: 2,
            background: i <= step ? T.primary : T.border,
            transition: 'background 0.3s',
          }} />
        ))}
      </div>

      {/* Header */}
      <div style={{ padding: '24px 24px 20px' }}>
        <div style={{ fontSize: 12, color: T.textMuted, fontWeight: 500, marginBottom: 4 }}>
          Steg {step + 1} av {steps.length}
        </div>
        <h2 style={{ fontSize: 24, fontWeight: 700, color: T.text, letterSpacing: '-0.3px' }}>
          {titles[step]}
        </h2>
      </div>

      {/* Step content */}
      <div style={{ flex: 1, overflow: 'auto', display: 'flex', flexDirection: 'column' }}>
        {steps[step]}
      </div>

      {/* Actions */}
      <div style={{ padding: '16px 24px 32px', display: 'flex', flexDirection: 'column', gap: 10 }}>
        <button onClick={handleNext} disabled={!canNext[step]} style={{
          width: '100%', padding: 16, borderRadius: 14,
          background: canNext[step] ? T.primary : T.border,
          color: canNext[step] ? '#fff' : T.textMuted,
          fontSize: 16, fontWeight: 600, border: 'none', cursor: canNext[step] ? 'pointer' : 'default',
          fontFamily: "'DM Sans', sans-serif",
          transition: 'all 0.2s',
        }}>
          {step < steps.length - 1 ? 'Fortsätt' : 'Starta appen →'}
        </button>
        {step === 0 && (
          <button onClick={handleNext} style={{
            background: 'none', border: 'none', color: T.textMuted,
            fontSize: 14, cursor: 'pointer', fontFamily: "'DM Sans', sans-serif",
          }}>
            Hoppa över
          </button>
        )}
      </div>
    </div>
  );
}

/* ── TRAINING EXERCISES ──────────────────────── */
const FALLBACK_EXERCISES = [
  { id: 'inkallning', label: 'Inkallning',  desc: 'Kalla på hunden med glad röst', total: 3, icon: '📣' },
  { id: 'sitt',       label: 'Sitt',        desc: 'Kort och tydligt kommando, belöna direkt', total: 5, icon: '🐾' },
  { id: 'ligg',       label: 'Ligg',        desc: 'Bygg upp tid i ligg gradvis', total: 3, icon: '😴' },
  { id: 'kontakt',    label: 'Ögonkontakt', desc: 'Belöna när hunden tittar på dig spontant', total: 4, icon: '👁️' },
  { id: 'spaning',    label: 'Markspaning', desc: 'Låt hunden utforska fritt i 5 min', total: 1, icon: '🌿' },
];

const ICON_MAP = {
  inkallning: '📣', recall: '📣', sit: '🐾', sitt: '🐾', ligg: '😴', down: '😴',
  ögonkontakt: '👁️', eye: '👁️', spaning: '🌿', nos: '👃', apport: '🎾',
  socialisering: '🐕', promenad: '🚶', lek: '🎮', default: '⭐',
};

function pickIcon(label) {
  const key = label.toLowerCase();
  for (const [k, v] of Object.entries(ICON_MAP)) {
    if (key.includes(k)) return v;
  }
  return ICON_MAP.default;
}

function ExerciseRow({ ex, done, onTap }) {
  const complete = done >= ex.total;
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 12,
      padding: '13px 16px',
      background: complete ? T.green50 : T.surface,
      borderBottom: `1px solid ${T.border}`,
      transition: 'background 0.25s',
    }}>
      {/* Icon */}
      <div style={{
        width: 38, height: 38, borderRadius: 10, flexShrink: 0,
        background: complete ? T.green100 : T.bgAlt,
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 18,
        transition: 'background 0.25s',
      }}>{ex.icon}</div>

      {/* Text */}
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{
          fontSize: 14, fontWeight: 600,
          color: complete ? T.primary : T.text,
          textDecoration: complete ? 'line-through' : 'none',
          transition: 'color 0.2s',
        }}>{ex.label}</div>
        <div style={{ fontSize: 12, color: T.textMuted, marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
          {ex.desc}
        </div>
      </div>

      {/* Counter / Done badge */}
      {complete ? (
        <div style={{
          width: 32, height: 32, borderRadius: '50%',
          background: T.primary, display: 'flex', alignItems: 'center', justifyContent: 'center',
          flexShrink: 0,
        }}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
      ) : (
        <button onClick={onTap} style={{
          display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 3,
          background: 'none', border: 'none', cursor: 'pointer', flexShrink: 0,
          padding: '4px 8px',
        }}>
          {/* Pips */}
          <div style={{ display: 'flex', gap: 4 }}>
            {Array.from({ length: ex.total }).map((_, i) => (
              <div key={i} style={{
                width: i < done ? 10 : 10, height: i < done ? 10 : 10,
                borderRadius: '50%',
                background: i < done ? T.primary : T.border,
                border: i === done ? `2px solid ${T.primary}` : 'none',
                transition: 'background 0.2s',
              }} />
            ))}
          </div>

}

// Shared helper: load or generate the full week plan
async function loadWeekPlan(weekNumber, breed) {
  const breedLabel = breed === 'braque_francais' ? 'Braque Français' : breed === 'labrador' ? 'Labrador Retriever' : 'Italiensk Vinthund';
  const cacheKey = `week_plan_w${weekNumber}_${breed}`;
  const cached = localStorage.getItem(cacheKey);
  if (cached) return JSON.parse(cached);

  const text = await window.claude.complete(
    `Du är en hundtränare. Skapa ett komplett veckoschema för vecka ${weekNumber} för en ${breedLabel}.

Svara ENDAST med JSON i detta format (ingen annan text):
{
  "days": [
    { "day": "Måndag", "exercises": [{ "id": "inkallning", "label": "Inkallning", "reps": 3, "desc": "Kort instruktion max 8 ord" }] },
    { "day": "Tisdag", "exercises": [...] },
    { "day": "Onsdag", "rest": true },
    ...
  ]
}

Regler:
- Täck alla 7 dagar (Måndag–Söndag)
- 2-3 övningar per träningsdag, sätt rest: true på vilodagar
- id ska vara lowercase utan mellanslag
- Skriv på svenska
- Anpassa efter vecka ${weekNumber}`
  );
  const match = text.match(/\{[\s\S]*\}/);
  const parsed = JSON.parse(match[0]);
  localStorage.setItem(cacheKey, JSON.stringify(parsed));
  return parsed;
}

function TrainingPlan({ weekNumber, breed, onAsk, onWeek, onAllDone }) {
  const todayName = new Date().toLocaleDateString('sv-SE', { weekday: 'long' });
  const todayCapitalized = todayName.charAt(0).toUpperCase() + todayName.slice(1);
  const doneKey = `training_done_${new Date().toISOString().slice(0,10)}_${breed}`;

  const [todayExercises, setTodayExercises] = useState(null);
  const [isRest, setIsRest] = useState(false);
  const [loading, setLoading] = useState(true);
  const [counts, setCounts] = useState(() => {
    try { return JSON.parse(localStorage.getItem(doneKey) || '{}'); } catch { return {}; }
  });

  useEffect(() => {
    async function load() {
      setLoading(true);
      try {
        const plan = await loadWeekPlan(weekNumber, breed);
        const today = plan.days?.find(d => d.day === todayCapitalized);
        if (today?.rest) { setIsRest(true); }
        else if (today?.exercises) {
          setTodayExercises(today.exercises.map(e => ({ ...e, total: e.reps || 3, icon: pickIcon(e.label) })));
        }
      } catch {
        setTodayExercises(FALLBACK_EXERCISES);
      } finally { setLoading(false); }
    }
    load();
  }, [weekNumber, breed]);

  function tap(id, total) {
    setCounts(prev => {
      const next = { ...prev, [id]: Math.min((prev[id] || 0) + 1, total) };
      localStorage.setItem(doneKey, JSON.stringify(next));
      // Check if all done after this tap
      const nowDone = list.filter(e => (next[e.id] || 0) >= e.total).length;
      if (nowDone === list.length && list.length > 0) {
        setTimeout(() => onAllDone && onAllDone(), 400);
      }
      return next;
    });
  }

  const list = todayExercises || [];
  const doneCount = list.filter(e => (counts[e.id] || 0) >= e.total).length;
  const allDone = list.length > 0 && doneCount === list.length;

  return (
    <div style={{ background: T.surface, borderRadius: 16, boxShadow: T.shadow, overflow: 'hidden', marginBottom: 16 }}>
      {/* Card header */}
      <div style={{
        background: T.green50, borderBottom: `1px solid ${T.green100}`,
        padding: '12px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
      }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.primary }}>Dagens pass</div>
          <div style={{ fontSize: 11, color: T.textMuted, marginTop: 1 }}>Vecka {weekNumber} · tryck av varje rep</div>
        </div>
        <div style={{
          fontSize: 11, fontWeight: 600,
          color: allDone ? T.primary : T.textMuted,
          background: allDone ? T.green100 : T.bgAlt,
          borderRadius: 20, padding: '3px 10px',
          transition: 'all 0.3s',
        }}>
          {loading ? '…' : `${doneCount}/${list.length} klara`}
        </div>
      </div>

      {/* Progress bar */}
      <div style={{ height: 3, background: T.border }}>
        <div style={{
          height: '100%', background: T.primary,
          width: loading || !list.length ? '0%' : `${(doneCount / list.length) * 100}%`,
          borderRadius: 2, transition: 'width 0.4s ease',
        }} />
      </div>

      {/* Loading skeleton */}
      {loading && (
        <div style={{ padding: '20px 16px', display: 'flex', flexDirection: 'column', gap: 14 }}>
          {[1,2,3,4].map(i => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <div style={{ width: 38, height: 38, borderRadius: 10, background: T.bgAlt }} />
              <div style={{ flex: 1 }}>
                <div style={{ height: 13, borderRadius: 6, background: T.bgAlt, width: '55%', marginBottom: 6 }} />
                <div style={{ height: 11, borderRadius: 6, background: T.bgAlt, width: '80%' }} />
              </div>
            </div>
          ))}
          <div style={{ fontSize: 12, color: T.textMuted, textAlign: 'center', marginTop: 4 }}>
            AI genererar träningsplan…
          </div>
        </div>
      )}

      {/* Auto-trigger log when all done */}
      {!loading && allDone && !isRest && (
        <div style={{
          padding: '16px', textAlign: 'center',
          borderBottom: `1px solid ${T.border}`,
          background: T.green50,
        }}>
          <div style={{ fontSize: 28, marginBottom: 4 }}>🎉</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: T.primary }}>Dagens pass avklarat!</div>
          <div style={{ fontSize: 12, color: T.textMuted, marginTop: 2 }}>Hur gick det?</div>
        </div>
      )}
        <div style={{ padding: '24px 16px', textAlign: 'center' }}>
          <div style={{ fontSize: 32, marginBottom: 8 }}>😴</div>
          <div style={{ fontSize: 15, fontWeight: 600, color: T.text, marginBottom: 4 }}>Vilodag idag</div>
          <div style={{ fontSize: 13, color: T.textMuted }}>Låt hunden återhämta sig. En kort promenad är okej.</div>
        </div>
      )}
        <div style={{
          padding: '16px', textAlign: 'center',
          borderBottom: `1px solid ${T.border}`,
          background: T.green50,
        }}>
          <div style={{ fontSize: 28, marginBottom: 4 }}>🎉</div>
          <div style={{ fontSize: 14, fontWeight: 700, color: T.primary }}>Dagens träning avklarad!</div>
          <div style={{ fontSize: 12, color: T.textMuted, marginTop: 2 }}>Fantastiskt jobbat!</div>
        </div>
      )}

      {/* Exercises */}
      {!loading && list.map(ex => (
        <ExerciseRow
          key={ex.id}
          ex={ex}
          done={counts[ex.id] || 0}
          onTap={() => tap(ex.id, ex.total)}
        />
      ))}

      {/* Ask + week link */}
      {!loading && (
        <div style={{ padding: '12px 16px', display: 'flex', flexDirection: 'column', gap: 8 }}>
          <button onClick={onAsk} style={{
            width: '100%', padding: '11px',
            borderRadius: 10, background: T.green50,
            border: `1.5px solid ${T.green100}`,
            color: T.primary, fontSize: 14, fontWeight: 600,
            cursor: 'pointer', fontFamily: "'DM Sans', sans-serif",

          </button>
          <button onClick={onWeek} style={{
            background: 'none', border: 'none', cursor: 'pointer',
            fontSize: 12, color: T.textMuted, fontFamily: "'DM Sans', sans-serif",

            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 4,
          }}>
            Visa hela veckans schema <ChevronRight size={13} color={T.textMuted} />
          </button>
        </div>
      )}
    </div>
  );
}

function ChatScreen({ profile, onNav }) {
  const [messages, setMessages] = useState(MOCK_CHAT);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef();
  const dogName = profile?.name || 'din hund';
  const weekNumber = profile?.birthdate
    ? Math.max(1, Math.floor((Date.now() - new Date(profile.birthdate)) / (1000 * 60 * 60 * 24 * 7)))
    : 14;

  useEffect(() => {
    if (bottomRef.current) {
      const el = bottomRef.current.parentElement;
      if (el) el.scrollTop = el.scrollHeight;
    }
  }, [messages, loading]);

  const QUICK = ['Vad tränar vi i vecka ' + weekNumber + '?', 'Hur länge bör ett pass vara?', 'Apportering — när börja?'];

  async function send(text) {
    const query = (text || input).trim();
    if (!query || loading) return;
    setInput('');
    setMessages(prev => [...prev, { role: 'user', content: query }]);
    setLoading(true);
    await new Promise(r => setTimeout(r, 1200));
    setMessages(prev => [...prev, {
      role: 'model',
      content: `Baserat på RAS-dokumentet för ${profile?.breed === 'braque_francais' ? 'Braque Français' : 'din ras'}: vid vecka ${weekNumber} rekommenderas korta, positiva träningssessioner om 5–10 minuter. Fokusera på grundläggande kommandon och socialisering. Hunden är fortfarande i en viktig inlärningsfas.`,
    }]);
    setLoading(false);
  }

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: T.bg }}>
      {/* Header */}
      <div style={{
        background: T.surface, borderBottom: `1px solid ${T.border}`,
        padding: '16px 20px',
        display: 'flex', alignItems: 'center', gap: 12,
      }}>
        <Avatar photo={profile?.photo} name={dogName} size={36} />
        <div>
          <div style={{ fontSize: 15, fontWeight: 700, color: T.text }}>Träningsassistenten</div>
          <div style={{ fontSize: 12, color: T.primaryLight, fontWeight: 500 }}>● Online</div>
        </div>
      </div>

      {/* Messages */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 16px 8px' }}>
        {messages.map((m, i) => (
          <div key={i} style={{
            display: 'flex', justifyContent: m.role === 'user' ? 'flex-end' : 'flex-start',
            marginBottom: 12,
          }}>
            {m.role === 'model' && (
              <div style={{
                width: 28, height: 28, borderRadius: '50%',
                background: T.green50, border: `2px solid ${T.green100}`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 14, marginRight: 8, flexShrink: 0, alignSelf: 'flex-end',
              }}>🐾</div>
            )}
            <div style={{
              maxWidth: '75%', padding: '12px 14px', borderRadius: 16,
              borderBottomRightRadius: m.role === 'user' ? 4 : 16,
              borderBottomLeftRadius: m.role === 'model' ? 4 : 16,
              background: m.role === 'user' ? T.primary : T.surface,
              color: m.role === 'user' ? '#fff' : T.text,
              fontSize: 14, lineHeight: 1.55,
              boxShadow: T.shadow,
            }}>
              {m.content}
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 8, marginBottom: 12 }}>
            <div style={{ width: 28, height: 28, borderRadius: '50%', background: T.green50, border: `2px solid ${T.green100}`, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14 }}>🐾</div>
            <div style={{ background: T.surface, borderRadius: 16, borderBottomLeftRadius: 4, padding: '12px 16px', boxShadow: T.shadow, display: 'flex', gap: 4 }}>
              {[0, 1, 2].map(i => (
                <div key={i} style={{
                  width: 7, height: 7, borderRadius: '50%', background: T.textMuted,
                  animation: `bounce 1.2s ease-in-out ${i * 0.2}s infinite`,
                }} />
              ))}
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* Quick suggestions */}
      {messages.length < 3 && (
        <div style={{ padding: '0 16px 8px', display: 'flex', gap: 8, overflowX: 'auto' }}>
          {QUICK.map((q, i) => (
            <button key={i} onClick={() => send(q)} style={{
              flexShrink: 0, padding: '8px 12px', borderRadius: 20,
              background: T.surface, border: `1.5px solid ${T.border}`,
              fontSize: 12, color: T.text, cursor: 'pointer',
              fontFamily: "'DM Sans', sans-serif",
              whiteSpace: 'nowrap',
            }}>{q}</button>
          ))}
        </div>
      )}

      {/* Input */}
      <div style={{
        display: 'flex', gap: 10, padding: '12px 16px',
        background: T.surface, borderTop: `1px solid ${T.border}`,
        paddingBottom: 76,
      }}>
        <textarea
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
          placeholder="Skriv en fråga…"
          rows={1}
          style={{
            flex: 1, padding: '12px 14px', borderRadius: 12,
            border: `1.5px solid ${T.border}`, resize: 'none',
            fontSize: 14, fontFamily: "'DM Sans', sans-serif",
            color: T.text, outline: 'none', lineHeight: 1.4,
          }}
        />
        <button onClick={() => send()} disabled={!input.trim() || loading} style={{
          width: 44, height: 44, borderRadius: 12,
          background: input.trim() ? T.primary : T.border,
          border: 'none', cursor: input.trim() ? 'pointer' : 'default',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          transition: 'background 0.2s', flexShrink: 0, alignSelf: 'flex-end',
        }}>
          <SendIcon color="#fff" />
        </button>
      </div>

      <BottomNav screen="chat" onNav={onNav} />
    </div>
  );
}

/* ── SCREEN: LOG HISTORY ─────────────────────── */
function LogScreen({ profile, onNav }) {
  const dogName = profile?.name || 'Din hund';

  const mockLogs = [
    { date: '28 apr', rating: 'good', focus: 4, obedience: 5, notes: 'Fantastisk session! Satt perfekt på kommando.' },
    { date: '26 apr', rating: 'mixed', focus: 3, obedience: 3, notes: 'Lite distraherad av andra hundar.' },
    { date: '24 apr', rating: 'good', focus: 5, obedience: 4, notes: '' },
    { date: '22 apr', rating: 'bad', focus: 2, obedience: 2, notes: 'Trött hund, avbröt träningen tidigt.' },
  ];

  const emojiMap = { good: '😄', mixed: '😐', bad: '😞' };
  const labelMap = { good: 'Bra', mixed: 'Blandat', bad: 'Svårt' };
  const colorMap = { good: T.primary, mixed: T.accent, bad: '#d62828' };

  function Dot({ value, max = 5 }) {
    return (
      <div style={{ display: 'flex', gap: 3 }}>
        {Array.from({ length: max }).map((_, i) => (
          <div key={i} style={{ width: 7, height: 7, borderRadius: '50%', background: i < value ? T.primary : T.border }} />
        ))}
      </div>
    );
  }

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: T.bg }}>
      {/* Header */}
      <div style={{
        background: T.surface, borderBottom: `1px solid ${T.border}`,
        padding: '20px 20px 16px',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <Avatar photo={profile?.photo} name={dogName} size={36} />
          <div>
            <h2 style={{ fontSize: 18, fontWeight: 700, color: T.text }}>{dogName}s logg</h2>
            <div style={{ fontSize: 12, color: T.textMuted }}>4 pass loggade</div>
          </div>
        </div>

        {/* Mini chart */}
        <div style={{ display: 'flex', gap: 4, marginTop: 16, alignItems: 'flex-end', height: 40 }}>
          {[3, 5, 4, 2, 4, 3, 4].map((v, i) => (
            <div key={i} style={{
              flex: 1, borderRadius: 4,
              height: `${(v / 5) * 100}%`,
              background: i === 6 ? T.primary : T.green100,
              transition: 'height 0.3s',
            }} />
          ))}
        </div>
        <div style={{ fontSize: 11, color: T.textMuted, marginTop: 6 }}>Fokus senaste 7 dagarna</div>
      </div>

      {/* Log entries */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px 16px 80px' }}>
        {mockLogs.map((log, i) => (
          <div key={i} style={{
            background: T.surface, borderRadius: 14, padding: '16px',
            marginBottom: 12, boxShadow: T.shadow,
            borderLeft: `4px solid ${colorMap[log.rating]}`,
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span style={{ fontSize: 22 }}>{emojiMap[log.rating]}</span>
                <div>
                  <div style={{ fontSize: 14, fontWeight: 700, color: T.text }}>{labelMap[log.rating]}</div>
                  <div style={{ fontSize: 12, color: T.textMuted }}>{log.date}</div>
                </div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 20, marginBottom: log.notes ? 10 : 0 }}>
              <div>
                <div style={{ fontSize: 11, color: T.textMuted, marginBottom: 4 }}>Fokus</div>
                <Dot value={log.focus} />
              </div>
              <div>
                <div style={{ fontSize: 11, color: T.textMuted, marginBottom: 4 }}>Lydnad</div>
                <Dot value={log.obedience} />
              </div>
            </div>
            {log.notes && <div style={{ fontSize: 13, color: T.textMuted, fontStyle: 'italic', borderTop: `1px solid ${T.border}`, paddingTop: 10, marginTop: 10, lineHeight: 1.5 }}>"{log.notes}"</div>}
          </div>
        ))}
      </div>

      <BottomNav screen="log" onNav={onNav} />
    </div>
  );
}

/* ── APP ROOT ─────────────────────────────────── */
function App() {
  const [screen, setScreen] = useState('landing');
  const [profile, setProfile] = useState(null);

  function handleOnboardingDone(data) {
    setProfile(data);
    setScreen('dashboard');
  }

  function navigate(s) {
    setScreen(s);
  }

  const content = (() => {
    switch (screen) {
      case 'landing': return <LandingScreen onStart={() => setScreen('onboarding')} />;
      case 'onboarding': return <OnboardingScreen onDone={handleOnboardingDone} />;
      case 'dashboard': return <DashboardScreen profile={profile} onNav={navigate} />;
      case 'chat': return <ChatScreen profile={profile} onNav={navigate} />;
      case 'log': return <LogScreen profile={profile} onNav={navigate} />;
      default: return null;
    }
  })();

  return (
    <IOSDevice dark={false}>
      <style>{`
        @keyframes bounce {
          0%, 100% { transform: translateY(0); }
          50% { transform: translateY(-4px); }
        }
        @keyframes slideUp {
          from { opacity: 0; transform: translateY(20px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { display: none; }
        * { scrollbar-width: none; }
      `}</style>
      {content}
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
